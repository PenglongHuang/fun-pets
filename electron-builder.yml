appId: com.funpets.app
productName: FunPets
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
win:
  target:
    - target: nsis
      arch: x64
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: FunPets
