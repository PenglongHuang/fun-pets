appId: com.funbuddy.app
productName: FunBuddy
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
  - node_modules/sharp/**/*
forceCodeSigning: false
win:
  target:
    - target: nsis
      arch: x64
  icon: resources/icon.png
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: FunBuddy
