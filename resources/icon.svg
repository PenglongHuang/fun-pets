<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="petGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="55" fill="#1C1C1E"/>
  <!-- Pet face circle -->
  <circle cx="128" cy="120" r="80" fill="url(#petGrad)" filter="url(#shadow)"/>
  <!-- Eyes -->
  <circle cx="103" cy="105" r="12" fill="rgba(30,30,30,0.85)"/>
  <circle cx="153" cy="105" r="12" fill="rgba(30,30,30,0.85)"/>
  <!-- Eye highlights -->
  <circle cx="106" cy="102" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="156" cy="102" r="4" fill="rgba(255,255,255,0.6)"/>
  <!-- Smile -->
  <path d="M 110 135 Q 128 152 146 135" stroke="rgba(30,30,30,0.6)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Cheek blushes -->
  <ellipse cx="88" cy="125" rx="10" ry="6" fill="rgba(255,120,140,0.2)"/>
  <ellipse cx="168" cy="125" rx="10" ry="6" fill="rgba(255,120,140,0.2)"/>
</svg>
